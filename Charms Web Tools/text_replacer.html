<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Replace</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font:14px/1.4 monospace;padding:20px;min-height:100vh}
        main{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
        textarea{background:#000;color:#fff;border:1px solid #fff;padding:10px;font:inherit;resize:vertical;min-height:150px}
        textarea:focus{outline:none}
        .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
        input[type=text]{background:#000;color:#fff;border:1px solid #fff;padding:10px;font:inherit;flex:1;min-width:100px}
        input[type=text]:focus{outline:none}
        input[type=file]{color:#fff}
        output{background:#000;color:#fff;border:1px solid #fff;padding:10px;display:block;min-height:150px;white-space:pre-wrap;word-break:break-all;overflow:auto}
    </style>
</head>
<body>
    <main>
        <textarea id="input" placeholder="Type or drop file"></textarea>
        <div class="row">
            <input type="text" id="find" placeholder="Find">
            <input type="text" id="replace" placeholder="Replace">
            <input type="file" id="upload">
        </div>
        <output id="output"></output>
    </main>
    <script>
        const input = document.getElementById('input');
        const findEl = document.getElementById('find');
        const replaceEl = document.getElementById('replace');
        const output = document.getElementById('output');
        const upload = document.getElementById('upload');

        function process() {
            const text = input.value;
            const f = findEl.value;
            output.textContent = f ? text.split(f).join(replaceEl.value) : text;
        }

        input.addEventListener('input', process);
        findEl.addEventListener('input', process);
        replaceEl.addEventListener('input', process);

        input.addEventListener('dragover', e => e.preventDefault());
        input.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) loadFile(file);
        });

        upload.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) loadFile(file);
        });

        function loadFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const text = e.target.result;
                if (text.includes('\x00')) {
                    const binReader = new FileReader();
                    binReader.onload = e => {
                        input.value = e.target.result;
                        process();
                    };
                    binReader.readAsDataURL(file);
                } else {
                    input.value = text;
                    process();
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
