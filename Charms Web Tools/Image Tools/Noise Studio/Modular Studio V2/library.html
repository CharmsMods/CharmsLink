<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Modular Studio Library</title>
    <meta http-equiv="refresh" content="0; url=index.html?section=library">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #101010;
            color: #f4f4f4;
            font: 13px/1.5 "Segoe UI", "Aptos", sans-serif;
        }
        a {
            color: inherit;
        }
        .shell {
            border: 1px solid #f4f4f4;
            padding: 18px 20px;
            max-width: 420px;
            text-align: center;
        }
        strong {
            display: block;
            margin-bottom: 8px;
            font: 600 13px/1.4 Consolas, "SFMono-Regular", monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body>
    <div class="shell">
        <strong>Library Moved</strong>
        <div>Redirecting to the integrated Library tab inside the main editor.</div>
        <div><a href="index.html?section=library">Open it manually</a> if the redirect does not happen.</div>
    </div>
    <script>
        window.location.replace(new URL('index.html?section=library', window.location.href).toString());
    </script>
</body>
</html>
