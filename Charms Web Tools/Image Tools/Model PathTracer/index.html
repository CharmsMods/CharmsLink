<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model PathTracer</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Import Maps for Three.js and Path Tracer -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
                "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
                "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh/build/index.module.js",
                "three-gpu-pathtracer": "https://cdn.jsdelivr.net/npm/three-gpu-pathtracer/build/index.module.js",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui/dist/lil-gui.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container" class="ui-container">
        <!-- UI elements will be populated by app/ui.js -->
        <div id="drop-zone" class="drop-zone hidden">
            <p>Drop model or texture here</p>
        </div>
    </div>
    
    <!-- Hidden file input for manual uploads -->
    <input type="file" id="file-input" style="display: none;" accept=".glb,.gltf,.obj,.fbx,.ply,.png,.jpg,.jpeg,.webp">

    <!-- The 3D Canvas -->
    <canvas id="gl-canvas"></canvas>

    <!-- Application Bootstrap -->
    <script type="module" src="main.js"></script>
</body>
</html>
